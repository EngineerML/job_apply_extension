<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Bid Assist</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        width: 400px;
        font-family: system-ui, sans-serif;
        font-size: 14px;
        background: #f9fafb;
        color: #111;
        padding: 16px;
      }

      h1 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }

      #job-info {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 10px 12px;
        margin-bottom: 12px;
        font-size: 13px;
        line-height: 1.5;
      }

      #job-info span { font-weight: 600; }

      textarea {
        width: 100%;
        height: 220px;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 10px;
        font-size: 13px;
        resize: vertical;
        background: #fff;
        line-height: 1.6;
      }

      textarea:focus { outline: 2px solid #6366f1; border-color: transparent; }

      .actions {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }

      button {
        flex: 1;
        padding: 8px 0;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: opacity 0.15s;
      }

      button:disabled { opacity: 0.5; cursor: not-allowed; }

      #btn-generate { background: #6366f1; color: #fff; }
      #btn-save     { background: #10b981; color: #fff; }
      #btn-download { background: #f3f4f6; color: #374151; }

      #status {
        margin-top: 8px;
        font-size: 12px;
        color: #6b7280;
        min-height: 16px;
        text-align: center;
      }

      #status.error { color: #ef4444; }
    </style>
  </head>
  <body>
    <h1>✍️ Bid Assist</h1>

    <div id="job-info">
      <div><span>Title:</span> <span id="job-title">—</span></div>
      <div><span>Company:</span> <span id="job-company">—</span></div>
    </div>

    <textarea id="cover-letter" placeholder="Your cover letter will appear here..."></textarea>

    <div class="actions">
      <button id="btn-generate">Generate</button>
      <button id="btn-save" disabled>Save</button>
      <button id="btn-download" disabled>Download</button>
    </div>

    <div id="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
