<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Bid Assist</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        width: 400px;
        height: 600px;
        font-family: system-ui, sans-serif;
        font-size: 14px;
        background: #f9fafb;
        color: #111;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── Header ── */
      header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 14px 16px 12px;
        border-bottom: 1px solid #e5e7eb;
        background: #fff;
        flex-shrink: 0;
      }

      header h1 { font-size: 15px; font-weight: 700; }

      #header-user {
        margin-left: auto;
        font-size: 12px;
        color: #6b7280;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 160px;
      }

      /* ── Views ── */
      .view {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: none;
        flex-direction: column;
        gap: 12px;
      }

      .view.active { display: flex; }

      /* ── Setup view ── */
      .field { display: flex; flex-direction: column; gap: 4px; }

      label { font-size: 12px; font-weight: 600; color: #374151; }

      input[type="text"] {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #e5e7eb;
        border-radius: 6px;
        font-size: 13px;
        background: #fff;
      }

      input[type="text"]:focus { outline: 2px solid #6366f1; border-color: transparent; }

      textarea {
        width: 100%;
        border: 1px solid #e5e7eb;
        border-radius: 6px;
        padding: 10px;
        font-size: 13px;
        resize: none;
        background: #fff;
        line-height: 1.6;
      }

      textarea:focus { outline: 2px solid #6366f1; border-color: transparent; }

      #resume-input   { height: 200px; }
      #cover-letter   { height: 220px; }

      /* ── Buttons ── */
      button {
        padding: 9px 0;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: opacity 0.15s;
        width: 100%;
      }

      button:disabled { opacity: 0.45; cursor: not-allowed; }

      .btn-primary  { background: #6366f1; color: #fff; }
      .btn-success  { background: #10b981; color: #fff; }
      .btn-neutral  { background: #f3f4f6; color: #374151; }

      /* ── Main nav view ── */
      #view-main { gap: 16px; }

      .welcome {
        font-size: 13px;
        color: #6b7280;
        text-align: center;
        padding-top: 4px;
      }

      .nav-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .nav-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        padding: 20px 12px;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        cursor: pointer;
        transition: border-color 0.15s, box-shadow 0.15s;
        font-size: 13px;
        font-weight: 500;
      }

      .nav-card:hover { border-color: #6366f1; box-shadow: 0 0 0 3px #eef2ff; }

      .nav-card .icon { font-size: 26px; }

      .nav-card.disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }

      /* ── Cover letter view ── */
      #job-info {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 13px;
        line-height: 1.6;
        flex-shrink: 0;
      }

      #job-info strong { font-weight: 600; }

      .row { display: flex; gap: 8px; }
      .row button { flex: 1; }

      /* ── Back button ── */
      .back-btn {
        display: flex;
        align-items: center;
        gap: 4px;
        background: none;
        border: none;
        font-size: 12px;
        color: #6b7280;
        cursor: pointer;
        padding: 0;
        width: auto;
        font-weight: 500;
      }

      .back-btn:hover { color: #111; }

      /* ── Status ── */
      .status {
        font-size: 12px;
        color: #6b7280;
        min-height: 16px;
        text-align: center;
      }

      .status.error { color: #ef4444; }
      .status.success { color: #10b981; }
    </style>
  </head>
  <body>

    <header>
      <span>✍️</span>
      <h1>Bid Assist</h1>
      <span id="header-user"></span>
    </header>

    <!-- ── View: Setup ── -->
    <div id="view-setup" class="view active">
      <div class="field">
        <label for="input-name">Your Name</label>
        <input type="text" id="input-name" placeholder="Jane Doe" />
      </div>
      <div class="field">
        <label for="resume-input">Your Resume</label>
        <textarea id="resume-input" placeholder="Paste your full resume text here…"></textarea>
      </div>
      <button id="btn-save-user" class="btn-primary">Save &amp; Continue</button>
      <div id="status-setup" class="status"></div>
    </div>

    <!-- ── View: Main nav ── -->
    <div id="view-main" class="view">
      <p class="welcome">What would you like to do?</p>
      <div class="nav-grid">
        <div class="nav-card" id="nav-cover-letter">
          <span class="icon">📝</span>
          Cover Letter
        </div>
        <div class="nav-card disabled" id="nav-resume-tailor">
          <span class="icon">🔧</span>
          Resume Tailor
          <span style="font-size:10px;color:#9ca3af;font-weight:400">Coming soon</span>
        </div>
      </div>
      <button id="btn-edit-profile" class="btn-neutral">✏️ Edit Name &amp; Resume</button>
    </div>

    <!-- ── View: Cover Letter ── -->
    <div id="view-cover-letter" class="view">
      <button class="back-btn" id="btn-back">← Back</button>

      <div id="job-info">
        <div><strong>Title:</strong> <span id="job-title">—</span></div>
        <div><strong>Company:</strong> <span id="job-company">—</span></div>
      </div>

      <textarea id="cover-letter" placeholder="Your cover letter will appear here…"></textarea>

      <button id="btn-generate" class="btn-primary">Generate Cover Letter</button>

      <div class="row">
        <button id="btn-save-cl" class="btn-success" disabled>Save</button>
        <button id="btn-download" class="btn-neutral" disabled>Download .txt</button>
        <button id="btn-download-pdf" class="btn-neutral" disabled>Download PDF</button>
      </div>

      <div id="status-cl" class="status"></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
